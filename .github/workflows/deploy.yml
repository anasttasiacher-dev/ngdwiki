name: Deploy site

# Пересобирает и публикует сайт при каждом изменении контента в ветке main
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не запускать несколько деплоев одновременно
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Заливка на хостинг reg.ru по FTP.
  # Включается, когда задана переменная репозитория DEPLOY_REGRU=true
  # и добавлены секреты FTP_SERVER / FTP_USERNAME / FTP_PASSWORD + переменная FTP_REMOTE_DIR.
  deploy-regru:
    if: ${{ vars.DEPLOY_REGRU == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: mkdocs build --strict
      - name: Add .htaccess (редиректы для хостинга)
        run: cp hosting/htaccess site/.htaccess
      - name: Upload to reg.ru via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_SERVER }}
          username: ${{ vars.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./site/
          server-dir: ${{ vars.FTP_REMOTE_DIR }}
